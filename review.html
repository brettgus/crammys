<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Image spoiler review</title>
<style>
  :root {
    --bg: #0b0b0f;
    --bg-elev: #15151c;
    --ink: #f4f3ee;
    --ink-soft: #b6b5ad;
    --ink-faint: #6e6d76;
    --line: #25252e;
    --safe: #4ade80;
    --spoil: #ef4444;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(11,11,15,.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 14px 22px;
    display: flex; gap: 16px; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 17px; font-weight: 600; }
  .stats { color: var(--ink-soft); font-size: 13px; font-variant-numeric: tabular-nums; }
  .stats em { font-style: normal; color: var(--ink); font-weight: 600; }
  .btns { display: flex; gap: 8px; }
  button {
    background: transparent; color: var(--ink); border: 1px solid var(--line);
    padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
    font-family: inherit; transition: background .15s ease;
  }
  button:hover { background: var(--bg-elev); }
  button.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  button.primary:hover { opacity: .9; }
  .filter-bar { display: flex; gap: 8px; align-items: center; color: var(--ink-soft); font-size: 13px; }
  .filter-bar input[type=text] {
    background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 10px; font-family: inherit; font-size: 13px;
    min-width: 200px;
  }

  main { padding: 16px 22px 80px; }
  .movie {
    margin-bottom: 28px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }
  .movie h2 {
    margin: 0 0 12px; font-size: 14px; font-weight: 600; letter-spacing: .02em;
    color: var(--ink-soft);
    display: flex; gap: 12px; align-items: baseline;
  }
  .movie h2 .year { color: var(--ink-faint); font-weight: 400; }
  .movie h2 strong { color: var(--ink); font-weight: 600; }
  .movie h2 .badge { font-size: 11px; padding: 2px 7px; border-radius: 99px; }
  .movie h2 .badge.spoil { background: rgba(239,68,68,.16); color: #ff8888; }
  .movie h2 .badge.safe { background: rgba(74,222,128,.16); color: #6dd99c; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .thumb {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    border: 3px solid var(--safe);
    aspect-ratio: 16/9;
    background: #000;
    transition: transform .1s ease;
  }
  .thumb.spoil { border-color: var(--spoil); }
  .thumb.poster { aspect-ratio: 2/3; }
  .thumb img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    transition: opacity .15s ease;
  }
  .thumb.spoil img { opacity: .5; }
  .thumb:hover { transform: scale(1.02); }
  .thumb .corner {
    position: absolute; top: 6px; left: 6px;
    background: rgba(0,0,0,.6); color: white;
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    text-transform: uppercase; letter-spacing: .08em;
  }
  .thumb .badge {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; line-height: 1;
    background: var(--safe); color: black;
  }
  .thumb.spoil .badge { background: var(--spoil); color: white; }
  .empty {
    color: var(--ink-faint); padding: 80px 22px; text-align: center;
    font-size: 14px;
  }
</style>
</head>
<body>
  <header>
    <h1>Image spoiler review</h1>
    <div class="filter-bar">
      <label><input type="checkbox" id="onlyFlagged"> show flagged only</label>
      <input type="text" id="search" placeholder="filter by movie…" />
    </div>
    <div class="stats" id="stats">—</div>
    <div class="btns">
      <button id="btnSafe">Mark all OK</button>
      <button id="btnDownload" class="primary">Download spoilers.js</button>
    </div>
  </header>
  <main id="main"><div class="empty">Loading…</div></main>

<script src="images.js"></script>
<script src="spoilers.js" onerror="window.SPOILERS={}"></script>
<script>
  const TMDB_W780 = "https://image.tmdb.org/t/p/w780";
  const USE_LOCAL = location.protocol === "file:";
  const manifest = window.MOVIE_IMAGES || [];
  // Working copy of spoilers (filename -> bool); start from whatever was loaded.
  const spoilers = Object.assign({}, window.SPOILERS || {});

  function imgSrc(img) {
    if (USE_LOCAL) return `images/${img.f}`;
    return img.p ? `${TMDB_W780}${img.p}` : `images/${img.f}`;
  }

  function render() {
    const main = document.getElementById("main");
    const onlyFlagged = document.getElementById("onlyFlagged").checked;
    const q = document.getElementById("search").value.trim().toLowerCase();
    let html = "";
    let total = 0, flagged = 0;
    for (const m of manifest) {
      const imgs = m.images || [];
      total += imgs.length;
      const f = imgs.filter(i => spoilers[i.f]).length;
      flagged += f;
      if (q && !m.movie.toLowerCase().includes(q) && String(m.year).indexOf(q) === -1) continue;
      const visible = onlyFlagged ? imgs.filter(i => spoilers[i.f]) : imgs;
      if (!visible.length) continue;
      html += `
        <section class="movie">
          <h2>
            <span class="year">${m.year}</span>
            <strong>${escape(m.movie)}</strong>
            <span class="badge ${f ? 'spoil' : 'safe'}">${f}/${imgs.length}</span>
          </h2>
          <div class="grid">
            ${visible.map(img => {
              const isSpoil = !!spoilers[img.f];
              const isPoster = img.k === "ps";
              return `
                <div class="thumb${isSpoil ? ' spoil' : ''}${isPoster ? ' poster' : ''}" data-fname="${img.f}">
                  <img src="${imgSrc(img)}" loading="lazy" alt="">
                  <span class="corner">${img.k === "ps" ? "Poster" : "Backdrop"}</span>
                  <span class="badge">${isSpoil ? "✕" : "✓"}</span>
                </div>`;
            }).join("")}
          </div>
        </section>
      `;
    }
    main.innerHTML = html || `<div class="empty">No matches.</div>`;
    document.getElementById("stats").innerHTML = `<em>${flagged}</em> flagged · <em>${total - flagged}</em> safe · <em>${total}</em> total`;
  }

  function escape(s) {
    return s.replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
  }

  document.getElementById("main").addEventListener("click", (e) => {
    const t = e.target.closest(".thumb");
    if (!t) return;
    const f = t.dataset.fname;
    spoilers[f] = !spoilers[f];
    render();
  });

  document.getElementById("btnSafe").addEventListener("click", () => {
    if (!confirm("Mark every image as OK (clear all spoiler flags)?")) return;
    for (const k of Object.keys(spoilers)) spoilers[k] = false;
    render();
  });

  document.getElementById("btnDownload").addEventListener("click", () => {
    const js = "window.SPOILERS = " + JSON.stringify(spoilers, null, 1) + ";\n";
    const blob = new Blob([js], { type: "application/javascript" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "spoilers.js"; a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById("onlyFlagged").addEventListener("change", render);
  document.getElementById("search").addEventListener("input", render);

  render();
</script>
</body>
</html>
