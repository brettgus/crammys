<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0f" />
<title>Crammys</title>
<link rel="stylesheet" href="crammys-shared.css?v=20260526a">
<script>
  (function () {
    try {
      var t = localStorage.getItem("crammys-theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  })();
</script>
<script src="crammys-shared.js" defer></script>
<style>
  .founder { cursor: pointer; border-bottom: 1px dotted var(--ink-faint); transition: color .15s ease, border-bottom-color .15s ease; }
  .founder:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .answer.long { font-size: clamp(22px, 3.8vw, 34px); }
  .more-toggle { background: transparent; border: 0; padding: 0 2px; color: var(--ink-faint); cursor: pointer; font: inherit; line-height: 1; border-bottom: 1px dotted var(--ink-faint); transition: color .15s ease, border-bottom-color .15s ease; }
  .more-toggle:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .tooltip.tip-summary { width: 420px; }
  .tip-wiki-link { margin-top: 8px; font-size: 12.5px; color: var(--ink-faint); }
  .tip-wiki-link a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--line); display: inline-flex; align-items: center; gap: 4px; }
  .tip-wiki-link a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .tip-wiki-link a svg { width: 10px; height: 10px; }
</style>
</head>
<body>
  <main>
    <div class="controls">
      <div class="deck-switcher">
        <button class="deck-btn" id="deckBtn" aria-haspopup="menu" aria-expanded="false" title="Switch deck">
          <span class="deck-emoji" id="deckEmoji">🎬</span>
          <span class="deck-name" id="deckName">Best Picture</span>
          <svg class="deck-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="deck-menu" id="deckMenu" role="menu" hidden></div>
      </div>
      <div class="seg" id="segContainer" role="tablist" aria-label="Direction"></div>
      <div class="right-cluster">
        <button class="chip chip-btn deck-info" id="deckChip" title="Change deck contents">
          <span id="counter">1 / 30</span>
          <span class="chip-sep">·</span>
          <span id="scopeText">...</span>
          <span id="scopeExtras" class="chip-extras"></span>
        </button>
        <div class="tools">
          <button class="icon-btn" id="shuffleIconBtn" title="Re-shuffle (S)" aria-label="Re-shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20l17-17"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
          </button>
          <button class="icon-btn" id="themeBtn" title="Light / dark mode (T)" aria-label="Light / dark mode"></button>
          <button class="icon-btn" id="aboutBtn" title="About / shortcuts (?)" aria-label="About">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 4.7 1.2c0 1.5-2.2 1.7-2.2 3.3"/><circle cx="12" cy="17" r="0.6" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="progress-wrap" aria-hidden="true">
      <div class="progress-bar" id="progress"></div>
    </div>

    <div class="card-stage">
      <button class="card-arrow card-arrow-prev" id="prevBtn" title="Previous (←)" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="card-arrow card-arrow-next" id="nextBtn" title="Next (→)" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="card" id="card" role="button" aria-label="Flip card" tabindex="0">
        <div class="face front" id="frontFace">
          <div class="corner">
            <span id="frontTag">—</span>
            <span class="score-stars" id="scoreStarsFront" aria-hidden="true"></span>
          </div>
          <div class="body">
            <div class="prompt" id="frontPrompt"></div>
            <div class="question" id="frontText">—</div>
          </div>
          <div class="footer-hint">
            <span class="hint-desktop"><kbd>Space</kbd> or tap to reveal · <kbd>←</kbd> <kbd>→</kbd> navigate</span>
            <span class="hint-touch">Tap to reveal · swipe to navigate</span>
          </div>
          <div id="frontExtras"></div>
        </div>
        <div class="face back">
          <div class="corner">
            <span id="backTag">Answer</span>
            <span class="score-stars" id="scoreStarsBack" aria-hidden="true"></span>
          </div>
          <div class="body" id="backBody"></div>
          <div class="footer-hint" id="backFooterHint">
            <span class="hint-desktop">Tap to flip back · <kbd>Y</kbd> got it · <kbd>N</kbd> missed</span>
            <span class="hint-touch">Tap to flip back</span>
          </div>
        </div>
      </div>
    </div>

    <div class="nav" id="navRow">
      <div class="nav-back">
        <button class="btn rate-btn rate-missed" id="missedBtn" title="Missed (N)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6L18 18M18 6L6 18"/></svg>
          Missed
        </button>
        <button class="btn rate-btn rate-got" id="gotBtn" title="Got it (Y)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>
          Got it
        </button>
      </div>
    </div>

    <div id="deckModals"></div>
    <div class="tooltip" id="tooltip" role="tooltip" aria-hidden="true"></div>

    <div class="modal-backdrop" id="spotifyModal" hidden>
      <div class="spotify-frame" role="dialog" aria-label="Spotify player">
        <button class="modal-close" id="spotifyClose" aria-label="Close player">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <iframe id="spotifyFrame" allow="encrypted-media" allowfullscreen style="border:0"></iframe>
      </div>
    </div>
  </main>

<script type="module">
  const _dv = "20260526a";
  const DECKS = [
    { id: "bestpicture", path: `./decks/bestpicture.js?v=${_dv}` },
    { id: "chains", path: `./decks/chains.js?v=${_dv}` },
    { id: "grammys", path: `./decks/grammys.js?v=${_dv}` },
    { id: "rockhall", path: `./decks/rockhall.js?v=${_dv}` },
    { id: "songs", path: `./decks/songs.js?v=${_dv}` },
  ];
  const DEFAULT_DECK = "bestpicture";

  let controller = null;

  function getDeckId() {
    const h = location.hash.replace("#", "");
    return DECKS.find(d => d.id === h) ? h : DEFAULT_DECK;
  }

  async function activateDeck(id) {
    if (controller) controller.abort();
    controller = new AbortController();
    const { signal } = controller;

    document.getElementById("card").classList.remove("flipped");
    document.getElementById("navRow").classList.remove("show-back");

    const entry = DECKS.find(d => d.id === id);
    const mod = await import(entry.path);

    document.title = `${mod.meta.name} · Crammys`;
    document.getElementById("deckEmoji").textContent = mod.meta.emoji;
    document.getElementById("deckName").textContent = mod.meta.name;
    document.getElementById("segContainer").innerHTML = mod.segments;
    document.getElementById("frontExtras").innerHTML = mod.frontExtras || "";
    document.getElementById("deckModals").innerHTML = mod.modals || "";

    window.CURRENT_DECK = mod.meta.id;

    await mod.init({ signal });
  }

  // ── Spotify embed modal ──────────────────────────────────────────
  import { openSpotifyEmbed, closeSpotifyEmbed } from './deck-engine.js';

  const spotifyCloseBtn = document.getElementById("spotifyClose");
  const spotifyModal = document.getElementById("spotifyModal");
  if (spotifyCloseBtn) spotifyCloseBtn.addEventListener("click", closeSpotifyEmbed);
  if (spotifyModal) spotifyModal.addEventListener("click", (e) => { if (e.target === spotifyModal) closeSpotifyEmbed(); });
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && spotifyModal && !spotifyModal.hidden) { closeSpotifyEmbed(); e.stopImmediatePropagation(); }
  });

  // ── Deck activation + routing ──────────────────────────────────────
  window.addEventListener("hashchange", () => activateDeck(getDeckId()));
  activateDeck(getDeckId());
</script>
</body>
</html>
